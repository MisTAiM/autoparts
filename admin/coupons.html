<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .admin-layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
    .admin-sidebar{background:var(--c-surface);border-right:1px solid var(--c-border);padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
    .admin-logo{padding:0 20px 24px;border-bottom:1px solid var(--c-border);font-family:var(--font-display);font-weight:900;font-size:1.1rem;text-transform:uppercase;display:flex;align-items:center;gap:8px}
    .admin-logo span{color:var(--c-accent)}
    .admin-nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--c-text-2);font-size:.88rem;transition:all var(--t-fast)}
    .admin-nav a:hover,.admin-nav a.active{background:var(--c-surface-2);color:var(--c-text)}
    .admin-nav a.active{border-left:2px solid var(--c-accent);color:var(--c-accent)}
    .admin-main{padding:32px;background:var(--c-bg)}
    /* card */
    .card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-lg);margin-bottom:20px}
    .card-header{padding:16px 20px;border-bottom:1px solid var(--c-border);display:flex;align-items:center;justify-content:space-between}
    .card-header h3{margin:0;font-size:.95rem;font-weight:700}
    .card-body{padding:20px}
    /* coupon table */
    .coupon-table{width:100%;border-collapse:collapse;font-size:.86rem}
    .coupon-table th{text-align:left;padding:10px 16px;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-3);border-bottom:1px solid var(--c-border);background:var(--c-surface-2)}
    .coupon-table td{padding:12px 16px;border-bottom:1px solid var(--c-border);vertical-align:middle}
    .coupon-table tr:last-child td{border-bottom:none}
    .coupon-table tr:hover td{background:var(--c-surface-2)}
    /* badge types */
    .badge-type{padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
    .badge-type.percent{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
    .badge-type.flat{background:rgba(34,197,94,.12);color:var(--c-success);border:1px solid rgba(34,197,94,.25)}
    .badge-type.shipping{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.25)}
    /* toggle switch */
    .toggle-switch{position:relative;display:inline-block;width:38px;height:22px;cursor:pointer}
    .toggle-switch input{opacity:0;width:0;height:0;position:absolute}
    .toggle-slider{position:absolute;inset:0;background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:100px;transition:.2s}
    .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:var(--c-text-3);border-radius:50%;transition:.2s}
    .toggle-switch input:checked + .toggle-slider{background:var(--c-accent);border-color:var(--c-accent)}
    .toggle-switch input:checked + .toggle-slider::before{transform:translateX(16px);background:#fff}
    /* form row */
    .form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group label{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-2);font-weight:600}
  </style>
</head>

<div class="content">

      <!-- Create Coupon -->
      <div class="card">

          <h3>+ Create Coupon</h3>
        </div>
        <div class="card-body">
          <div id="create-alert"></div>
          <div class="form-row">
            <div class="form-group">
              <label>Code</label>
              <input type="text" id="cc-code" placeholder="SAVE10" style="text-transform:uppercase" maxlength="20">
            </div>
            <div class="form-group">
              <label>Type</label>
              <select id="cc-type">
                <option value="percent">% Percent Off</option>
                <option value="flat">$ Flat Off</option>
                <option value="shipping">Free Shipping</option>
              </select>
            </div>
            <div class="form-group">
              <label>Value (% or $)</label>
              <input type="number" id="cc-value" placeholder="10" min="0" step="0.01">
            </div>
            <div class="form-group">
              <label>Min Order ($)</label>
              <input type="number" id="cc-min" placeholder="0" min="0" step="1">
            </div>
            <div class="form-group">
              <label>Max Uses (blank = unlimited)</label>
              <input type="number" id="cc-max" placeholder="Unlimited" min="1" step="1">
            </div>
            <div class="form-group">
              <label>Expires (blank = never)</label>
              <input type="date" id="cc-expires">
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="cc-desc" placeholder="e.g. 10% off any order" maxlength="100">
          </div>

        </div>
        <div class="card-body" style="padding:0">
          <table class="coupon-table">
            <thead>
              <tr>
                <th>Code</th><th>Type</th><th>Value</th><th>Min Order</th><th>Uses</th><th>Expires</th><th>Active</th><th></th>
              </tr>
            </thead>
            <tbody id="coupons-tbody"></tbody>
          </table>
        </div>

<script>
function toggleSidebar() {
  document.getElementById('admin-sidebar').classList.toggle('mobile-open');
  document.getElementById('admin-overlay').classList.toggle('open');
}
</script>
  <script src="../js/modules/admin-auth.js"></script>
  <script src="../js/modules/coupons.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!AdminAuth.requireAdmin()) return;
    const session = AdminAuth.getSession();
    document.getElementById('admin-name').textContent = session.username || "Admin";
    document.getElementById('logout-link').addEventListener('click', e => { e.preventDefault(); AdminAuth.logout(); });

    renderCoupons();

    document.getElementById('create-coupon-btn').addEventListener('click', () => {
      const code  = Security.sanitizeText(document.getElementById('cc-code').value, 20).toUpperCase();
      const type  = document.getElementById('cc-type').value;
      const value = parseFloat(document.getElementById('cc-value').value) || 0;
      const min   = parseFloat(document.getElementById('cc-min').value) || 0;
      const max   = document.getElementById('cc-max').value ? parseInt(document.getElementById('cc-max').value) : null;
      const exp   = document.getElementById('cc-expires').value || null;
      const desc  = Security.sanitizeText(document.getElementById('cc-desc').value, 100);

      if (!code) return showAlert('create-alert', 'Code is required.', 'danger');
      if (type !== 'shipping' && value <= 0) return showAlert('create-alert', 'Value must be greater than 0.', 'danger');

      const result = Coupons.create({ code, type, value, minOrder: min, maxUses: max, description: desc, expiresAt: exp ? new Date(exp).toISOString() : null });
      showAlert('create-alert', result.ok ? `Coupon "${code}" created!` : result.error, result.ok ? 'success' : 'danger');
      if (result.ok) { renderCoupons(); ['cc-code','cc-value','cc-min','cc-max','cc-desc','cc-expires'].forEach(id => document.getElementById(id).value = ''); }
    });
  });

  function renderCoupons() {
    const coupons = Coupons.getAll();
    document.getElementById('coupon-count').textContent = `${coupons.length} coupon${coupons.length !== 1 ? 's' : ''}`;
    document.getElementById('coupons-tbody').innerHTML = coupons.map(c => {
      const typeLabel = { percent: `${c.value}% Off`, flat: `$${c.value.toFixed(2)} Off`, shipping: 'Free Shipping' }[c.type] || c.type;
      const expired   = c.expiresAt && new Date() > new Date(c.expiresAt);
      return `<tr style="${expired ? 'opacity:.5' : ''}">
        <td>
          <span style="font-family:var(--font-mono);font-weight:700;letter-spacing:.04em;color:var(--c-accent)">${Security.escapeHtml(c.code)}</span>
          <div style="font-size:.75rem;color:var(--c-text-3);margin-top:2px">${Security.escapeHtml(c.description)}</div>
        </td>
        <td><span class="badge-type ${c.type}">${Security.escapeHtml(c.type)}</span></td>
        <td style="font-weight:600">${typeLabel}</td>
        <td>${c.minOrder > 0 ? `$${c.minOrder.toFixed(2)}` : '<span style="color:var(--c-text-3)">None</span>'}</td>
        <td>${c.uses}${c.maxUses !== null ? `/${c.maxUses}` : ''}</td>
        <td style="font-size:.8rem;color:var(--c-text-3)">${c.expiresAt ? `<span style="color:${expired?'var(--c-danger)':'inherit'}">${new Date(c.expiresAt).toLocaleDateString()}</span>` : '—'}</td>
        <td>
          <label class="toggle-switch">
            <input type="checkbox" ${c.active ? 'checked' : ''} data-code="${Security.escapeHtml(c.code)}" class="toggle-active">
            <span class="toggle-slider"></span>
          </label>
        </td>
        <td>
          <button class="btn btn-ghost btn-sm delete-coupon" data-code="${Security.escapeHtml(c.code)}" style="color:var(--c-danger)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </td>
      </tr>`;
    }).join('') || '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--c-text-3)">No coupons yet. Create one above.</td></tr>';

    document.querySelectorAll('.toggle-active').forEach(cb => {
      cb.addEventListener('change', () => { Coupons.update(cb.dataset.code, { active: cb.checked }); });
    });
    document.querySelectorAll('.delete-coupon').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm(`Delete coupon ${btn.dataset.code}?`)) return;
        Coupons.remove(btn.dataset.code);
        renderCoupons();
      });
    });
  }

  function showAlert(id, msg, type) {
    const colors = { success:'var(--c-success-dim)', danger:'var(--c-danger-dim)' };
    const borders = { success:'rgba(16,185,129,.3)', danger:'rgba(239,68,68,.3)' };
    const textColors = { success:'var(--c-success)', danger:'var(--c-danger)' };
    document.getElementById(id).innerHTML = `<div style="background:${colors[type]};border:1px solid ${borders[type]};color:${textColors[type]};padding:10px 14px;border-radius:var(--radius);font-size:.85rem;margin-bottom:12px">${Security.escapeHtml(msg)}</div>`;
    setTimeout(() => { const el = document.getElementById(id); if(el) el.innerHTML=''; }, 4000);
  }
  </script>
</body>
