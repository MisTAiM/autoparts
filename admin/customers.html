<script>

function toggleSidebar() {
  document.getElementById('admin-sidebar').classList.toggle('mobile-open');
  document.getElementById('admin-overlay').classList.toggle('open');
}

</script>
  <script src="../js/modules/admin-auth.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!AdminAuth.requireAdmin()) return;
    const session = AdminAuth.getSession();
    document.getElementById('admin-name').textContent = session.username || "Admin";
    document.getElementById('logout-link').addEventListener('click', e => { e.preventDefault(); AdminAuth.logout(); });

    const customers = getCustomers();
    const orders    = getOrders();
    renderStats(customers, orders);
    renderTable(customers, orders);

    document.getElementById('search-customers').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      const filtered = customers.filter(c =>
        c.firstName?.toLowerCase().includes(q) ||
        c.lastName?.toLowerCase().includes(q) ||
        c.email?.toLowerCase().includes(q)
      );
      renderTable(filtered, orders);
    });
  });

  function getCustomers() {
    try { return JSON.parse(localStorage.getItem('ap_users') || '[]'); } catch { return []; }
  }

  function getOrders() {
    try { return JSON.parse(localStorage.getItem('ap_admin_orders') || '[]'); } catch { return []; }
  }

  function renderStats(customers, orders) {
    const totalSpent = orders.reduce((s, o) => s + (o.total || 0), 0);
    const avgOrder   = orders.length ? totalSpent / orders.length : 0;
    document.getElementById('customer-stats').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Customers</div><div class="stat-value">${customers.length}</div></div>
      <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value">${orders.length}</div></div>
      <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value accent">$${totalSpent.toFixed(2)}</div></div>
      <div class="stat-card"><div class="stat-label">Avg Order Value</div><div class="stat-value">$${avgOrder.toFixed(2)}</div></div>`;
  }

  function renderTable(customers, orders) {
    document.getElementById('customer-count').textContent = `${customers.length} customer${customers.length !== 1 ? 's' : ''}`;
    document.getElementById('customers-tbody').innerHTML = customers.length ? customers.map(c => {
      const custOrders = orders.filter(o => o.customerEmail === c.email);
      const spent      = custOrders.reduce((s, o) => s + (o.total || 0), 0);
      const initials   = ((c.firstName || '?')[0] + (c.lastName || '?')[0]).toUpperCase();
      return `<tr>
        <td><div class="avatar">${Security.escapeHtml(initials)}</div></td>
        <td>
          <div style="font-weight:600">${Security.escapeHtml(c.firstName || '')} ${Security.escapeHtml(c.lastName || '')}</div>
          ${c.phone ? `<div style="font-size:.75rem;color:var(--c-text-3)">${Security.escapeHtml(c.phone)}</div>` : ''}
        </td>
        <td style="font-family:var(--font-mono);font-size:.8rem;color:var(--c-text-2)">${Security.escapeHtml(c.email || '')}</td>
        <td style="font-size:.8rem;color:var(--c-text-3)">${new Date(c.createdAt).toLocaleDateString()}</td>
        <td style="font-weight:600">${custOrders.length}</td>
        <td style="color:var(--c-accent);font-weight:700;font-family:var(--font-display)">$${spent.toFixed(2)}</td>
        <td style="font-size:.8rem;color:var(--c-text-3)">${(c.savedVehicles || []).length} saved</td>
      </tr>`;
    }).join('') : `<tr><td colspan="7" style="text-align:center;padding:48px;color:var(--c-text-3)">No customers registered yet.</td></tr>`;
  }
  
</script>
</body>
