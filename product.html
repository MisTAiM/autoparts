<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product | AutoParts Warehouse</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/product-cart-checkout.css">

  <style>
    .sticky-atc {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      background: var(--c-surface); border-top: 1px solid var(--c-border);
      padding: 12px 16px; align-items: center; gap: 12px;
      box-shadow: 0 -4px 20px rgba(0,0,0,.4);
      transform: translateY(100%);
      transition: transform .25s ease;
    }
    .sticky-atc.visible { transform: translateY(0); }
    .sticky-atc-name { flex: 1; font-size: .85rem; font-weight: 600; line-height: 1.2; color: var(--c-text); }
    .sticky-atc-price { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--c-accent); flex-shrink: 0; }
    @media (min-width: 769px) { .sticky-atc { display: none !important; } }
    @media (max-width: 768px) { .sticky-atc { display: flex; } body { padding-bottom: 80px; } }
  </style>
</head>
<body>

<header id="site-header"></header>
<div class="mobile-nav" id="mobile-nav"></div>

</div>

<main class="product-page">
  <div class="container--narrow" id="product-root">
    <div style="display:flex;align-items:center;justify-content:center;height:300px">
      <span class="spinner" style="width:40px;height:40px"></span>
    </div>
  </div>
</main>

<footer id="site-footer">
  <div class="footer-grid">
    <div class="footer-brand">
      <div class="site-logo" style="margin-bottom:12px">⚙ Auto<span>Parts</span></div>
      <p>Quality auto parts shipped direct from our warehouse nationwide.</p>
    </div>
    <div class="footer-col"><h5>Shop</h5><a href="catalog.html">All Parts</a></div>
    <div class="footer-col"><h5>Orders</h5><a href="cart.html">Cart</a><a href="checkout.html">Checkout</a></div>
    <div class="footer-col"><h5>Info</h5><a href="#">Shipping</a><a href="#">Core Charges</a></div>
  </div>
  <div class="footer-bottom">
    <span>© 2025 AutoParts Warehouse.</span>
    <span>Outbound shipping only</span>
  </div>
</footer>

</div>

<script src="js/data/parts-data.js"></script>
<script src="js/modules/vehicle-db.js"></script>
<script src="js/modules/cart.js"></script>
<script src="js/modules/catalog.js"></script>
<script src="js/modules/shipping.js"></script>
<script src="js/modules/notify.js"></script>
<script src="js/modules/security.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/modules/inventory-db.js"></script>
<script src="js/modules/print.js"></script>
<script src="js/modules/ui.js"></script>
<script src="js/modules/wishlist.js"></script>
<script src="js/modules/recently-viewed.js"></script>
<script src="js/modules/coupons.js"></script>
<script src="js/modules/icons.js"></script>
<script src="js/components/header.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  InventoryDB.seedFromSampleData();
  Cart.init();
  SiteHeader.init();


  const id   = UI.getParam('id');
  const root = document.getElementById('product-root');

  if (!id) { root.innerHTML = '<div class="alert alert-danger">No product ID specified.</div>'; return; }

  const part = InventoryDB.getById(parseInt(id));
  if (!part) { root.innerHTML = '<div class="alert alert-danger">Product not found.</div>'; return; }

  document.title = `${part.name} | AutoParts Warehouse`;

  // Track recently viewed
  if (window.RecentlyViewed) RecentlyViewed.track(part);
  if (window.AnalyticsTracker) AnalyticsTracker.trackProductView(part.id, part.name, part.brand, part.price);

  // Render recently viewed (excluding current)
  if (window.RecentlyViewed) {
    const viewed = RecentlyViewed.getItems().filter(i => i.id !== part.id).slice(0, 4);
    if (viewed.length) {
      const rvSection = document.createElement('section');
      rvSection.style.cssText = 'padding:48px 0;border-top:1px solid var(--c-border)';
      rvSection.innerHTML = `
        <div class="container--narrow">
          <h2 style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:20px;color:var(--c-text-2)">
            <i class="fa-solid fa-clock-rotate-left" style="color:var(--c-accent);margin-right:8px"></i>Recently Viewed
          </h2>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px">
            ${viewed.map(v => `
              <a href="product.html?id=${v.id}" style="text-decoration:none;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-lg);padding:14px;display:block;transition:border-color .15s" onmouseover="this.style.borderColor='rgba(245,158,11,.4)'" onmouseout="this.style.borderColor='var(--c-border)'">
                <div style="font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-3);margin-bottom:4px">${Security.escapeHtml(v.brand)}</div>
                <div style="font-family:var(--font-display);font-size:.95rem;font-weight:600;color:var(--c-text);margin-bottom:6px;line-height:1.2">${Security.escapeHtml(v.name)}</div>
                <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--c-accent)">$${Number(v.price).toFixed(2)}</div>
              </a>`).join('')}
          </div>
        </div>`;
      document.querySelector('main')?.appendChild(rvSection);
    }
  }

  const vehicle    = window.VehicleDB ? VehicleDB.getState() : (YMM?.getState() || {});
  const hasVehicle = !!vehicle.year;
  const fitResult  = hasVehicle && part.fitment
    ? VehicleDB.checkFitment(part, vehicle)
    : { fits: true, confidence: 'unknown', notes: [] };
  const isCompatible = !hasVehicle || fitResult.fits;

  const stockClass = part.inStock ? (part.stockQty <= 3 ? 'low-stock' : 'in-stock') : 'out-stock';
  const stockLabel = part.inStock ? (part.stockQty <= 3 ? `Low Stock — ${part.stockQty} left` : 'In Stock') : 'Out of Stock';

  const specsRows = Object.entries(part.specs || {}).map(([k,v]) =>
    `<tr><td>${k}</td><td><strong>${v}</strong></td></tr>`
  ).join('');

  root.innerHTML = `
    <div class="product-breadcrumb">
      <a href="index.html">Home</a><span>›</span>
      <a href="catalog.html">All Parts</a><span>›</span>
      <a href="catalog.html?cat=${part.categoryId}">${part.categoryName}</a><span>›</span>
      <span>${part.name}</span>
    </div>

    <div class="product-layout">
      <!-- Gallery -->
      <div class="product-gallery">
        <div class="gallery-main" id="gallery-main">
          ${part.images?.length
            ? `<img id="main-img" src="${part.images[0]}" alt="${part.name}">`
            : '<i class="fa-solid fa-gear no-img"></i>'}
        </div>
        ${part.images?.length > 1 ? `
          <div class="gallery-thumbs" id="gallery-thumbs">
            ${part.images.map((src, i) => `
              <div class="gallery-thumb ${i===0?'active':''}" data-src="${src}" data-idx="${i}">
                <img src="${src}" alt="">
              </div>
            `).join('')}
          </div>` : ''}
      </div>

      <!-- Info -->
      <div class="product-info">
        <div class="product-category-tag">
          <span class="badge badge-muted">${part.categoryName}</span>
          ${part.condition !== 'new' ? `<span class="badge badge-info" style="margin-left:6px">${UI.fmtCondition(part.condition)}</span>` : ''}
        </div>

        <h1 class="product-title">${part.name}</h1>
        <div class="product-partnum">Brand: ${part.brand} &nbsp;·&nbsp; Part #: ${part.partNumber}</div>

        <div class="product-price-block">
          <div class="product-price">${UI.fmt$$(part.price)}</div>
          ${part.coreCharge > 0 ? `
            <div class="product-price-core">+ ${UI.fmt$$(part.coreCharge)} core charge</div>
            <div class="core-info">Core refunded when you return your old part</div>
          ` : ''}
        </div>

        <div class="product-stock">
          <span class="stock-dot ${stockClass}"></span>
          <span>${stockLabel}</span>
        </div>

        <!-- Vehicle compat check -->
        <div class="product-compat">
          <div class="compat-title">Vehicle Fitment</div>
          ${hasVehicle
            ? `<div class="compat-check ${isCompatible ? 'match' : ''}">
                ${isCompatible ? '<i class="fa-solid fa-circle-check" style="color:var(--c-success)"></i> Fits your ' + vehicle.year + ' ' + vehicle.makeName + ' ' + vehicle.modelName : '<i class="fa-solid fa-triangle-exclamation" style="color:var(--c-warning)"></i> Check fitment — may not match your vehicle'}
               </div>`
            : `<div class="compat-check no-vehicle">
                <a href="index.html" style="color:var(--c-accent)">Select your vehicle</a> to verify fitment
               </div>`}
        </div>

        <!-- Add to cart -->
        <div class="add-to-cart-row" style="flex-wrap:wrap">
          <div class="qty-control">
            <button id="qty-minus">−</button>
            <input type="number" id="qty-input" value="1" min="1" max="${part.stockQty || 99}">
            <button id="qty-plus">+</button>
          </div>
          <button class="btn btn-primary btn-lg" id="add-to-cart-btn" ${!part.inStock ? 'disabled' : ''}>
            <i class="fa-solid fa-cart-plus"></i> Add to Cart
          </button>
          <button class="btn btn-outline" id="wishlist-btn" title="Save to Wishlist">
            <i class="fa-regular fa-heart"></i> Wishlist
          </button>
        </div>

        <!-- Meta grid -->
        <div class="product-meta">
          <div class="meta-item"><div class="meta-key">Weight</div><div class="meta-val">${part.weight} lbs</div></div>
          <div class="meta-item"><div class="meta-key">Condition</div><div class="meta-val">${UI.fmtCondition(part.condition)}</div></div>
          <div class="meta-item"><div class="meta-key">Brand</div><div class="meta-val">${part.brand}</div></div>
          <div class="meta-item"><div class="meta-key">Part Number</div><div class="meta-val text-mono">${part.partNumber}</div></div>
        </div>

        <!-- Shipping note -->
        <div class="alert alert-info" style="margin-top:20px;font-size:0.83rem">
          <i class="fa-solid fa-truck-fast"></i> <strong>Outbound shipping only.</strong> Ships within 1–2 business days. Free shipping on orders over $150.
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="product-tabs">
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="description">Description</button>
        ${specsRows ? '<button class="tab-btn" data-tab="specs">Specifications</button>' : ''}
        <button class="tab-btn" data-tab="fitment">Fitment / Compatibility</button>
        <button class="tab-btn" data-tab="shipping">Shipping & Returns</button>
      </div>

      <div class="tab-panel active" id="tab-description">
        <p style="line-height:1.8;color:var(--c-text-2)">${part.description || 'No description available.'}</p>
      </div>

      ${specsRows ? `
      <div class="tab-panel" id="tab-specs">
        <table class="specs-table">${specsRows}</table>
      </div>` : ''}

      <div class="tab-panel" id="tab-fitment">
        ${!part.fitment ? `<div class="alert alert-warning">No fitment data available. Verify part number with your vehicle's OEM catalog before ordering.</div>` : (() => {
          const f = part.fitment;
          const confidenceBadge = hasVehicle
            ? fitResult.confidence === 'verified'
              ? `<span style="background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3);padding:3px 10px;border-radius:999px;font-size:.75rem;font-weight:700"><i class="fa-solid fa-circle-check"></i> Verified Fit</span>`
              : fitResult.confidence === 'likely'
              ? `<span style="background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.3);padding:3px 10px;border-radius:999px;font-size:.75rem;font-weight:700"><i class="fa-solid fa-circle-info"></i> Likely Compatible</span>`
              : `<span style="background:rgba(245,158,11,.12);color:var(--c-accent);border:1px solid rgba(245,158,11,.3);padding:3px 10px;border-radius:999px;font-size:.75rem;font-weight:700"><i class="fa-solid fa-triangle-exclamation"></i> Verify Fitment</span>`
            : '';
          return `
          <div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
            <div style="font-weight:700;font-size:.9rem">Vehicle Compatibility</div>
            ${confidenceBadge}
          </div>
          ${hasVehicle && fitResult.notes?.length ? `<div class="alert alert-warning" style="margin-bottom:14px;font-size:.8rem">${fitResult.notes.join('<br>')}</div>` : ''}
          <table class="compat-table">
            <thead><tr><th>Years</th><th>Makes</th><th>Models</th><th>Engines</th><th>Drive</th></tr></thead>
            <tbody>
              <tr>
                <td>${f.yearStart}–${f.yearEnd}</td>
                <td>${(f.makes||[]).join(', ') || '—'}</td>
                <td>${(f.models||[]).join(', ') || '—'}</td>
                <td>${(f.engines||[]).join(', ') || 'All'}</td>
                <td>${(f.driveTypes||[]).join(' / ') || '—'}</td>
              </tr>
            </tbody>
          </table>
          ${f.brakeCode ? `<div style="margin-top:12px;font-size:.8rem"><i class="fa-solid fa-gear" style="color:var(--c-accent)"></i> <strong>Brake Code:</strong> ${f.brakeCode} &nbsp;|&nbsp; <strong>Caliper:</strong> ${f.caliperPistons || 'Verify'}</div>` : ''}
          ${f.notes ? `<div style="margin-top:10px;font-size:.78rem;color:var(--c-text-3);background:var(--c-surface-2);padding:10px 14px;border-radius:var(--radius);border-left:3px solid var(--c-accent)"><i class="fa-solid fa-circle-info"></i> ${f.notes}</div>` : ''}`;
        })()}
      </div>

      <div class="tab-panel" id="tab-shipping">
        <ul style="list-style:none;padding:0;display:flex;flex-direction:column;gap:14px">
          <li><i class="fa-solid fa-truck-fast"></i> <strong>Outbound shipping only</strong> — all orders ship from our warehouse, no in-store pickup.</li>
          <li><i class="fa-solid fa-box"></i> Ships within <strong>1–2 business days</strong> of order confirmation.</li>
          <li><i class="fa-solid fa-dollar-sign"></i> <strong>Free standard shipping</strong> on orders over $150.</li>
          <li><i class="fa-solid fa-recycle"></i> <strong>Core charges:</strong> Refunded when you ship back the old part within 30 days.</li>
          <li><i class="fa-solid fa-rotate-left"></i> <strong>Returns:</strong> Unused parts returnable within 30 days in original packaging. Core returns accepted for 90 days.</li>
        </ul>
      </div>
    </div>

    <!-- Related parts -->
    <div style="margin-top:60px">
      <h2 style="margin-bottom:24px">Related Parts</h2>
      <div class="parts-grid" id="related-parts">
        <div style="grid-column:1/-1;display:flex;justify-content:center"><span class="spinner" style="width:28px;height:28px"></span></div>
      </div>
    </div>
  `;

  // ── Gallery thumbs ───────────────────────────────────
  document.querySelectorAll('.gallery-thumb').forEach(thumb => {
    thumb.addEventListener('click', () => {
      document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
      document.getElementById('main-img').src = thumb.dataset.src;
    });
  });

  // ── Qty controls ─────────────────────────────────────
  const qtyInput = document.getElementById('qty-input');
  document.getElementById('qty-minus').addEventListener('click', () => {
    qtyInput.value = Math.max(1, parseInt(qtyInput.value) - 1);
  });
  document.getElementById('qty-plus').addEventListener('click', () => {
    qtyInput.value = Math.min(part.stockQty || 99, parseInt(qtyInput.value) + 1);
  });

  // ── Add to cart ───────────────────────────────────────
  // Wishlist button
  const wishBtn = document.getElementById('wishlist-btn');
  if (wishBtn && window.Wishlist) {
    const updateWishBtn = () => {
      const inWish = Wishlist.has(part.id);
      wishBtn.innerHTML = inWish ? '<i class="fa-solid fa-heart"></i> Saved' : '<i class="fa-regular fa-heart"></i> Wishlist';
      wishBtn.classList.toggle('btn-danger', inWish);
      wishBtn.classList.toggle('btn-outline', !inWish);
    };
    updateWishBtn();
    wishBtn.addEventListener('click', () => { Wishlist.toggle(part); updateWishBtn(); });
  }

  // ── Sticky add-to-cart (mobile) ─────────────────────
  const stickyBar  = document.getElementById('sticky-atc');
  const stickyName = document.getElementById('sticky-atc-name');
  const stickyPrice= document.getElementById('sticky-atc-price');
  const stickyBtn  = document.getElementById('sticky-atc-btn');
  if (stickyBar && part.inStock) {
    stickyName.textContent  = part.name;
    stickyPrice.textContent = `$${Number(part.price).toFixed(2)}`;
    stickyBtn.addEventListener('click', () => {
      const qty = parseInt(document.getElementById('qty-input')?.value) || 1;
      Cart.addItem(part, qty);
      if (window.AnalyticsTracker) AnalyticsTracker.trackAddToCart(part.id, part.name, part.price, qty);
      UI.toast(`${qty}× ${part.name} added to cart!`);
    });
    const observer = new IntersectionObserver(([e]) => {
      stickyBar.classList.toggle('visible', !e.isIntersecting);
    }, { threshold: 0.1 });
    const addBtn = document.getElementById('add-to-cart-btn');
    if (addBtn) observer.observe(addBtn);
  }

  document.getElementById('add-to-cart-btn').addEventListener('click', () => {
    const qty = parseInt(qtyInput.value) || 1;
    Cart.addItem(part, qty);
    if (window.AnalyticsTracker) AnalyticsTracker.trackAddToCart(part.id, part.name, part.price, qty);
    UI.toast(`${qty}× ${part.name} added to cart!`);
  });

  // ── Tabs ──────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const panel = document.getElementById(`tab-${btn.dataset.tab}`);
      if (panel) panel.classList.add('active');
    });
  });

  // ── Related parts ─────────────────────────────────────
  const related = InventoryDB.getRelated(part, 4);
  const relEl = document.getElementById('related-parts');
  if (!related.length) {
    relEl.innerHTML = '<p class="text-muted">No related parts found.</p>';
  } else {
    relEl.innerHTML = related.map(p => `
      <div class="part-card" data-id="${p.id}" style="cursor:pointer" onclick="window.location='product.html?id=${p.id}'">
        <div class="part-card-img"><i class="fa-solid fa-gear no-img" style="font-size:2rem;color:var(--c-border-2)"></i></div>
        <div class="part-card-body">
          <div class="part-category">${p.categoryName}</div>
          <div class="part-name">${p.name}</div>
          <div class="part-number">${p.brand} · ${p.partNumber}</div>
          <div class="part-card-footer">
            <div class="part-price">$${p.price.toFixed(2)}</div>
            <span class="badge badge-muted">View →</span>
          </div>
        </div>
      </div>
    `).join('');
  }
});
</script>

  <!-- Sticky Add to Cart (mobile) -->
  <div class="sticky-atc" id="sticky-atc">
    <div class="sticky-atc-name" id="sticky-atc-name"></div>
    <div class="sticky-atc-price" id="sticky-atc-price"></div>
    <button class="btn btn-primary btn-sm" id="sticky-atc-btn" style="flex-shrink:0">
      <i class="fa-solid fa-cart-plus"></i> Add
    </button>
  </div>
<script src="js/modules/analytics-tracker.js"></script>
<script>document.addEventListener('DOMContentLoaded', function(){ if(window.APIcons) APIcons.patchFA(); });</script>
</body>
</html>
